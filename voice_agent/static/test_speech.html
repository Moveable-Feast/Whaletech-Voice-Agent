<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音识别测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .status {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        
        .status.waiting {
            background: #e9ecef;
            color: #666;
        }
        
        .status.listening {
            background: #fff3cd;
            color: #856404;
            animation: pulse 1s infinite;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        
        .button.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .button.secondary {
            background: #6c757d;
            color: white;
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result-box {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            min-height: 100px;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .result-label {
            color: #666;
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .result-text {
            color: #333;
            font-size: 18px;
            line-height: 1.6;
            word-wrap: break-word;
        }
        
        .info-box {
            background: #e7f3ff;
            border: 1px solid #b8daff;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 13px;
            color: #004085;
        }
        
        .info-box h3 {
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .info-box ul {
            margin-left: 20px;
        }
        
        .info-box li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 语音识别测试</h1>
        
        <div id="status" class="status waiting">
            点击下方按钮开始测试
        </div>
        
        <button id="startBtn" class="button primary" onclick="startTest()">
            开始录音测试
        </button>
        
        <button id="stopBtn" class="button secondary" onclick="stopTest()" disabled>
            停止测试
        </button>
        
        <div class="result-box">
            <div class="result-label">识别结果</div>
            <div id="result" class="result-text">等待识别...</div>
        </div>
        
        <div class="info-box">
            <h3>💡 使用说明</h3>
            <ul>
                <li>请使用 Chrome 浏览器</li>
                <li>允许麦克风权限</li>
                <li>点击"开始录音测试"按钮</li>
                <li>开始说话，系统会显示识别结果</li>
                <li>如果没有反应，请检查麦克风是否正常</li>
            </ul>
        </div>
    </div>

    <script>
        let recognition = null;
        let isRunning = false;

        function showStatus(type, message) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status ' + type;
            statusEl.innerHTML = message;
        }

        function updateResult(text) {
            document.getElementById('result').textContent = text;
        }

        function startTest() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                showStatus('error', '<strong>浏览器不支持语音识别</strong><br>请使用Chrome浏览器');
                return;
            }

            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    initRecognition();
                    stream.getTracks().forEach(track => track.stop());
                })
                .catch(err => {
                    console.error('麦克风错误:', err);
                    if (err.name === 'NotAllowedError') {
                        showStatus('error', '<strong>麦克风权限被拒绝</strong><br>请在浏览器地址栏左侧点击🔒图标，允许麦克风访问');
                    } else if (err.name === 'NotFoundError') {
                        showStatus('error', '<strong>未找到麦克风设备</strong><br>请检查麦克风是否连接');
                    } else {
                        showStatus('error', '<strong>无法访问麦克风</strong><br>错误: ' + err.message);
                    }
                });
        }

        function initRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                isRunning = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                showStatus('listening', '🎤 正在聆听，请说话...');
                updateResult('正在识别...');
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (finalTranscript) {
                    updateResult(finalTranscript);
                } else if (interimTranscript) {
                    updateResult(interimTranscript + ' (识别中...)');
                }
            };

            recognition.onerror = (event) => {
                console.error('识别错误:', event.error);
                if (event.error === 'no-speech') {
                    showStatus('listening', '🎤 没有检测到声音，请继续说话...');
                } else if (event.error === 'not-allowed') {
                    showStatus('error', '麦克风权限被拒绝');
                    stopTest();
                } else {
                    showStatus('error', '识别错误: ' + event.error);
                }
            };

            recognition.onend = () => {
                if (isRunning) {
                    try {
                        recognition.start();
                    } catch (e) {
                        console.error('重启识别失败:', e);
                    }
                }
            };

            recognition.start();
        }

        function stopTest() {
            isRunning = false;
            if (recognition) {
                recognition.stop();
            }
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            showStatus('waiting', '测试已停止，点击重新开始');
        }
    </script>
</body>
</html>
