<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>园区访客登记 - 扫码入口</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }
        
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 2px dashed #eee;
        }
        
        .qr-code {
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border-radius: 10px;
        }
        
        .instructions {
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        
        .instructions h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .instructions ol {
            color: #666;
            font-size: 14px;
            line-height: 2;
            padding-left: 20px;
            margin: 0;
        }
        
        .tip {
            font-size: 12px;
            color: #999;
            margin-top: 15px;
        }
        
        .refresh-btn {
            margin-top: 15px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .status-bar {
            margin-top: 15px;
            padding: 10px;
            background: #e7f3ff;
            border-radius: 8px;
            font-size: 12px;
            color: #0c63e4;
        }
        
        .footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚗</div>
        <h1>园区访客登记</h1>
        <p class="subtitle">请使用手机扫描二维码</p>
        
        <div class="qr-container">
            <img id="qrImage" class="qr-code" src="/api/qr/generate" alt="访客登记二维码">
        </div>
        
        <button class="refresh-btn" onclick="refreshQR()">🔄 刷新二维码</button>
        
        <div class="status-bar" id="statusBar">
            🟢 服务正常运行 | 最后刷新: <span id="lastRefresh"></span>
        </div>
        
        <div class="instructions">
            <h3>📋 操作步骤</h3>
            <ol>
                <li>打开手机相机或微信"扫一扫"</li>
                <li>扫描上方二维码</li>
                <li>选择语音或文字模式进行登记</li>
                <li>完成后系统自动通知门卫抬杆</li>
            </ol>
        </div>
        
        <p class="tip">💡 提示：建议将此页面全屏显示或打印张贴</p>
        
        <div class="footer">
            © 2024 园区访客登记系统 | 版本 1.0
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN');
            document.getElementById('lastRefresh').textContent = timeStr;
        }
        
        function refreshQR() {
            const img = document.getElementById('qrImage');
            img.src = `/api/qr/generate?timestamp=${Date.now()}`;
            updateTime();
            
            const statusBar = document.getElementById('statusBar');
            statusBar.style.background = '#d4edda';
            statusBar.style.color = '#155724';
            statusBar.innerHTML = '🟢 二维码已刷新 | 最后刷新: <span id="lastRefresh"></span>';
            
            setTimeout(() => {
                statusBar.style.background = '#e7f3ff';
                statusBar.style.color = '#0c63e4';
                statusBar.innerHTML = '🟢 服务正常运行 | 最后刷新: <span id="lastRefresh"></span>';
            }, 3000);
        }
        
        updateTime();
        
        setInterval(() => {
            updateTime();
        }, 60000);
        
        setInterval(refreshQR, 5 * 60 * 1000);
        
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                refreshQR();
            }
        });
    </script>
</body>
</html>
